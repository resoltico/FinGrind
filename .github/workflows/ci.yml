name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          # On PRs, only read from the cache to avoid cache poisoning from untrusted code.
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Check and enforce coverage
        # Active Jazzer fuzzing is intentionally local-only and hard-fails under GITHUB_ACTIONS.
        run: ./gradlew check --no-daemon

      - name: Verify managed SQLite CLI runtime
        run: |
          set -euo pipefail
          output="$(./gradlew :cli:run --args='capabilities' --no-daemon --console=plain)"
          printf '%s\n' "$output"
          printf '%s\n' "$output" | grep -Eq '"sqliteLibraryMode"[[:space:]]*:[[:space:]]*"managed-only"'
          printf '%s\n' "$output" | grep -Eq '"requiredMinimumSqliteVersion"[[:space:]]*:[[:space:]]*"3\.53\.0"'
          printf '%s\n' "$output" | grep -Eq '"sqliteRuntimeStatus"[[:space:]]*:[[:space:]]*"ready"'
          printf '%s\n' "$output" | grep -Eq '"loadedSqliteVersion"[[:space:]]*:[[:space:]]*"3\.53\.0"'

      - name: Build self-contained CLI bundle
        run: ./gradlew :cli:bundleCliArchive --no-daemon --console=plain

      - name: Smoke test the self-contained CLI bundle
        run: ./scripts/bundle-smoke.sh

  windows-bundle-smoke:
    name: Windows bundle smoke
    runs-on: windows-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Check and enforce coverage on Windows
        shell: pwsh
        run: .\gradlew.bat check --no-daemon --console=plain

      - name: Verify managed SQLite CLI runtime on Windows
        shell: pwsh
        run: |
          $output = .\gradlew.bat :cli:run --args='capabilities' --no-daemon --console=plain | Out-String
          Write-Host $output
          if ($output -notmatch '"sqliteLibraryMode"\s*:\s*"managed-only"') { throw "missing managed-only sqlite library mode" }
          if ($output -notmatch '"requiredMinimumSqliteVersion"\s*:\s*"3\.53\.0"') { throw "missing required minimum SQLite version" }
          if ($output -notmatch '"sqliteRuntimeStatus"\s*:\s*"ready"') { throw "missing ready sqlite runtime status" }
          if ($output -notmatch '"loadedSqliteVersion"\s*:\s*"3\.53\.0"') { throw "missing loaded SQLite version" }

      - name: Build self-contained Windows CLI bundle
        shell: pwsh
        run: .\gradlew.bat :cli:bundleCliArchive -PfingrindBundleClassifier=windows-x86_64 --no-daemon --console=plain

      - name: Smoke test the Windows CLI bundle
        shell: pwsh
        run: .\scripts\bundle-smoke.ps1

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build internal application JAR for the Docker image
        run: ./gradlew :cli:shadowJar --no-daemon

      - name: Smoke test the Docker image
        run: ./scripts/docker-smoke.sh
