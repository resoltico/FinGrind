name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build, publish, and verify (for example v0.25.0)
        required: true
        type: string

concurrency:
  group: publication-${{ github.workflow }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.target-tag.outputs.tag }}
      version: ${{ steps.target-tag.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Determine target release tag
        id: target-tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${TAG}" ]; then
            echo "::error::target release tag is required"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches project version
        run: |
          TAG_VERSION="${{ steps.target-tag.outputs.version }}"
          GRADLE_VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gradle.properties version ($GRADLE_VERSION)"
            exit 1
          fi

      - name: Converge the GitHub release object
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.target-tag.outputs.tag }}
        run: ./scripts/publish-github-release.sh

  build-bundles:
    name: Build bundle (${{ matrix.classifier }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            classifier: linux-x86_64
            expected_os: Linux
            expected_arch: x86_64
          - runner: ubuntu-24.04-arm
            classifier: linux-aarch64
            expected_os: Linux
            expected_arch: aarch64
          - runner: macos-latest
            classifier: macos-aarch64
            expected_os: Darwin
            expected_arch: arm64
          - runner: macos-13
            classifier: macos-x86_64
            expected_os: Darwin
            expected_arch: x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Verify runner identity matches bundle target
        run: |
          set -euo pipefail
          actual_os="$(uname -s)"
          actual_arch="$(uname -m)"
          [ "${actual_os}" = "${{ matrix.expected_os }}" ] || {
            echo "Expected OS ${{ matrix.expected_os }} but runner reported ${actual_os}"
            exit 1
          }
          [ "${actual_arch}" = "${{ matrix.expected_arch }}" ] || {
            echo "Expected arch ${{ matrix.expected_arch }} but runner reported ${actual_arch}"
            exit 1
          }

      - name: Build self-contained CLI bundle
        run: |
          ./gradlew :cli:bundleCliArchive \
            -PfingrindBundleClassifier=${{ matrix.classifier }} \
            --no-daemon \
            --console=plain

      - name: Smoke test the self-contained CLI bundle
        run: |
          ./scripts/bundle-smoke.sh \
            "cli/build/distributions/fingrind-${{ needs.prepare-release.outputs.version }}-${{ matrix.classifier }}.tar.gz"

      - name: Publish bundle assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          ./scripts/publish-github-release.sh \
            "cli/build/distributions/fingrind-${{ needs.prepare-release.outputs.version }}-${{ matrix.classifier }}.tar.gz" \
            "cli/build/distributions/fingrind-${{ needs.prepare-release.outputs.version }}-${{ matrix.classifier }}.tar.gz.sha256"

  verify-release:
    name: Verify GitHub release assets
    needs:
      - prepare-release
      - build-bundles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Verify GitHub release handoff
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          ./scripts/verify-github-release.sh \
            "fingrind-${{ needs.prepare-release.outputs.version }}-linux-x86_64.tar.gz" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-linux-x86_64.tar.gz.sha256" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-linux-aarch64.tar.gz" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-linux-aarch64.tar.gz.sha256" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-macos-x86_64.tar.gz" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-macos-x86_64.tar.gz.sha256" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-macos-aarch64.tar.gz" \
            "fingrind-${{ needs.prepare-release.outputs.version }}-macos-aarch64.tar.gz.sha256"
